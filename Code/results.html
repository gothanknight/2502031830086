<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Results — RecipeAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div data-component="navbar"></div>

  <!-- Header -->
  <div class="page-header">
    <div class="container position-relative" style="z-index:1">
      <h1>🎉 Recipes Found for You!</h1>
      <p id="filterSummary">Loading your preferences…</p>
    </div>
  </div>

  <div class="container section-gap-sm">

    <!-- Filter Bar -->
    <div class="d-flex flex-wrap align-items-center gap-3 mb-4 p-3 bg-white rounded-3 shadow-sm">
      <span class="text-muted fw-600" style="font-size:0.9rem;font-weight:600">Sort by:</span>
      <div class="d-flex gap-2 flex-wrap">
        <button class="sort-btn choice-chip selected" data-sort="match">⭐ Best Match</button>
        <button class="sort-btn choice-chip" data-sort="time">⏱ Cooking Time</button>
        <button class="sort-btn choice-chip" data-sort="rating">🌟 Rating</button>
      </div>
      <div class="ms-auto">
        <span class="text-muted" style="font-size:0.88rem">
          <strong class="text-dark" id="resultCount">0</strong> recipes found
        </span>
      </div>
      <a href="ingredients.html" class="btn btn-outline-secondary btn-sm">🔄 Start Over</a>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display:none">
      <div class="spinner"></div>
      <p class="text-muted">Finding the best recipes for you…</p>
    </div>

    <!-- Results Grid -->
    <div class="row g-4" id="resultsContainer"></div>

  </div>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/recipes-data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    $(document).ready(function () {
      initResultsPage();
    });
  </script>
</body>
</html>
