<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites — RecipeAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div data-component="navbar"></div>

  <div class="page-header">
    <div class="container position-relative" style="z-index:1">
      <h1>⭐ My Favorite Recipes</h1>
      <p>Your saved collection — stored locally and always available offline.</p>
    </div>
  </div>

  <div class="container section-gap-sm">

    <!-- Stats bar -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="bg-white rounded-3 p-3 text-center shadow-sm">
          <div style="font-size:1.8rem;font-weight:800;color:var(--primary)" id="favCount">0</div>
          <div class="text-muted" style="font-size:0.82rem">Saved Recipes</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="bg-white rounded-3 p-3 text-center shadow-sm">
          <div style="font-size:1.8rem;font-weight:800;color:var(--secondary)" id="cuisineCount">0</div>
          <div class="text-muted" style="font-size:0.82rem">Cuisines</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="bg-white rounded-3 p-3 text-center shadow-sm">
          <div style="font-size:1.8rem">🔒</div>
          <div class="text-muted" style="font-size:0.82rem">Local Storage</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="bg-white rounded-3 p-3 text-center shadow-sm">
          <div style="font-size:1.8rem">📱</div>
          <div class="text-muted" style="font-size:0.82rem">Works Offline</div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="d-flex flex-wrap gap-3 align-items-center mb-4">
      <div class="position-relative flex-grow-1" style="max-width:400px">
        <span style="position:absolute;left:12px;top:12px">🔍</span>
        <input type="text" id="favSearch" class="form-control-custom"
          placeholder="Search favorites…" style="padding-left:36px !important;">
      </div>
      <button class="btn btn-outline-danger btn-sm" onclick="clearAllFavorites()">
        🗑 Clear All
      </button>
      <a href="ingredients.html" class="btn btn-primary-custom btn-sm">+ Find More Recipes</a>
    </div>

    <!-- Tip banner -->
    <div class="alert mb-4" style="background:var(--primary-lt);border:1.5px solid var(--primary);border-radius:10px;font-size:0.88rem">
      💡 <strong>Tip:</strong> Click the ♡ icon on any recipe card to instantly save it here. Your favorites persist in your browser's localStorage.
    </div>

    <!-- Favorites Grid -->
    <div class="row g-4" id="favoritesContainer"></div>

  </div>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/recipes-data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    $(document).ready(function () {
      initFavoritesPage();
      updateStats();
    });

    function updateStats() {
      const favIds = JSON.parse(localStorage.getItem("recipeai_favorites") || "[]");
      const favRecipes = RECIPES_DB.filter(r => favIds.includes(r.id));
      const uniqueCuisines = [...new Set(favRecipes.map(r => r.cuisine))].length;
      $("#favCount").text(favIds.length);
      $("#cuisineCount").text(uniqueCuisines || 0);
    }

    function clearAllFavorites() {
      if (!confirm("Remove all favorites? This cannot be undone.")) return;
      localStorage.removeItem("recipeai_favorites");
      showToast("All favorites cleared.", "info");
      location.reload();
    }
  </script>
</body>
</html>
